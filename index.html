<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>견적서 품목 추출기</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">PDF 내부 텍스트 기반</p>
        <h1>견적서 품목 추출기</h1>
      </div>
      <div class="privacy">파일은 브라우저 안에서만 처리됩니다</div>
    </header>

    <section class="workspace">
      <div class="upload-panel">
        <label class="dropzone" for="pdfFile" id="dropzone">
          <input id="pdfFile" type="file" accept="application/pdf,.pdf">
          <span class="upload-icon">PDF</span>
          <strong>견적서 PDF를 선택하거나 끌어오세요</strong>
          <span>G마켓 견적서처럼 텍스트가 살아있는 PDF를 지원합니다.</span>
        </label>

        <div class="actions">
          <button id="extractBtn" type="button" disabled>추출하기</button>
          <button id="sampleBtn" type="button" class="secondary">결과 비우기</button>
        </div>

        <div class="status" id="status">아직 선택된 PDF가 없습니다.</div>
      </div>

      <aside class="settings">
        <h2>키워드 매칭 규칙</h2>
        <ul class="rules">
          <li>상품명 / 필수선택 / 추가구성 → 내용</li>
          <li>규격 → 개</li>
          <li>수량 → 수량</li>
          <li>예상단가 → 공급가액 ÷ 수량</li>
          <li>할인금액은 계산에서 제외</li>
        </ul>
      </aside>
    </section>

    <section class="results">
      <div class="section-head">
        <div>
          <p class="eyebrow">추출 결과</p>
          <h2 id="resultTitle">품목 0개</h2>
        </div>
        <div class="export-actions">
          <button id="copyJson" type="button" class="secondary" disabled>JSON 복사</button>
          <button id="downloadCsv" type="button" class="secondary" disabled>CSV 저장</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>순번</th>
              <th>내용</th>
              <th>규격</th>
              <th>수량</th>
              <th>예상단가</th>
              <th>페이지</th>
            </tr>
          </thead>
          <tbody id="resultBody">
            <tr class="empty-row">
              <td colspan="6">PDF를 업로드하면 품목이 여기에 표시됩니다.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="debug-panel">
      <details>
        <summary>추출 로그 보기</summary>
        <pre id="debugLog"></pre>
      </details>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
